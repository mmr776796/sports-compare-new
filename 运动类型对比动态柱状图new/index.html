<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不同运动类型对BMI改善效果对比 — 动态柱状图</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
/* ===== Palette tokens ===== */
:root {
  --surface-1:      #d2d7df;
  --page-plane:     #D9DEE6;
  --text-primary:   #0b0b0b;
  --text-secondary: #52514e;
  --text-muted:     #898781;
  --gridline:       #c5cad3;
  --baseline:       #b8b8b3;
  --border-ring:    rgba(11,11,11,0.08);
  --s-hiit:         #2a78d6;
  --s-ce:           #1baf7a;
  --s-mict:         #eda100;
  --s-mae:          #008300;
  --delta-up:       #006300;
}

[data-theme="dark"] {
  --surface-1:      #1e1e1e;
  --page-plane:     #141414;
  --text-primary:   #ffffff;
  --text-secondary: #c3c2b7;
  --text-muted:     #898781;
  --gridline:       #2c2c2a;
  --baseline:       #383835;
  --border-ring:    rgba(255,255,255,0.08);
  --s-hiit:         #3987e5;
  --s-ce:           #199e70;
  --s-mict:         #c98500;
  --s-mae:          #008300;
  --delta-up:       #0ca30c;
}

/* ===== Base ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  background: var(--page-plane);
  color: var(--text-primary);
  display: flex; justify-content: center;
  padding: 12px 12px 20px; min-height: 100vh;
}
.dashboard {
  width: 100%; max-width: 600px;
  display: flex; flex-direction: column; gap: 10px;
}

/* ===== Toolbar ===== */
.toolbar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.view-toggles {
  display: flex; gap: 2px;
  background: var(--surface-1);
  border: 1px solid var(--border-ring);
  border-radius: 6px; padding: 2px;
}
.view-toggle {
  padding: 4px 10px; border: none; background: transparent;
  color: var(--text-secondary); font-size: 0.7rem;
  font-family: inherit; font-weight: 500;
  border-radius: 4px; cursor: pointer;
  transition: background 0.15s, color 0.15s; white-space: nowrap;
}
.view-toggle:hover { color: var(--text-primary); }
.view-toggle.active { background: var(--s-hiit); color: #fff; font-weight: 600; }

.theme-btn {
  background: var(--surface-1);
  border: 1px solid var(--border-ring); border-radius: 6px;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.85rem;
  color: var(--text-secondary); transition: background 0.15s;
}
.theme-btn:hover { background: var(--gridline); }

/* ===== Chart card ===== */
.main-row {
  display: flex; gap: 8px; align-items: stretch;
}
.chart-card {
  flex: 1; min-width: 0;
  background: var(--surface-1);
  border: 1px solid var(--border-ring); border-radius: 8px;
  padding: 12px 12px 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.chart-card h2 {
  font-size: 0.8rem; font-weight: 650; color: var(--text-primary);
}
.chart-card .subtitle {
  font-size: 0.68rem; color: var(--text-secondary);
  line-height: 1.45;
}
.chart-container { width: 100%; height: 280px; }

/* ===== Stat tiles ===== */
.stat-row {
  display: flex; flex-direction: column; gap: 8px;
  width: 170px; flex-shrink: 0;
}
.stat-tile {
  flex: 1;
  background: var(--surface-1);
  border: 1px solid var(--border-ring); border-radius: 7px;
  padding: 8px 10px;
  display: flex; flex-direction: column; justify-content: center; gap: 2px;
  transition: transform 0.2s, box-shadow 0.2s; cursor: default;
}
.stat-tile:hover {
  transform: translateY(-1px);
  box-shadow: 0 3px 12px rgba(0,0,0,0.07);
}
.stat-tile .label {
  font-size: 0.6rem; color: var(--text-secondary);
  font-weight: 500;
}
.stat-tile .value {
  font-size: 1rem; font-weight: 650; line-height: 1.15;
}
.stat-tile .meta {
  font-size: 0.55rem; color: var(--text-muted);
  display: flex; align-items: center; gap: 3px;
}
.stat-tile .dot {
  width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
}

@media (max-width: 700px) {
  .main-row { flex-direction: column; }
  .stat-row { flex-direction: row; width: 100%; }
  .toolbar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="dashboard">

  <!-- ===== Toolbar ===== -->
  <div class="toolbar">
    <div class="view-toggles" id="viewToggles">
      <button class="view-toggle active" data-view="bmi">📊 BMI 降低效果对比</button>
      <button class="view-toggle" data-view="sucra">🏆 综合效果排名</button>
      <button class="view-toggle" data-view="dose">⚡ 最低有效剂量对比</button>
    </div>
    <button class="theme-btn" id="themeBtn" title="切换深色/浅色模式" aria-label="切换深色模式">🌙</button>
  </div>

  <!-- ===== Main Chart + Stats ===== -->
  <div class="main-row">
    <div class="chart-card">
      <h2 id="chartTitle">BMI 降低效果对比</h2>
      <p class="subtitle" id="chartSubtitle"></p>
      <div class="chart-container" id="mainChart"></div>
    </div>
    <div class="stat-row" id="statRow"></div>
  </div>

</div>

<script>
(function() {
  // ============ DATA (from Huang et al. 2025, BMC Public Health) ============
  const exercises = [
    {
      id: 'HIIT',
      short: 'HIIT · 高强度间歇',
      full: '高强度间歇训练（短时间高强度运动与休息交替）',
      bmiMD: -1.33, bmiLow: -2.01, bmiHigh: -0.66,
      sucra: 77.68,
      dose: 76,
      n: 117, arms: 11,
      cssVar: '--s-hiit'
    },
    {
      id: 'CE',
      short: 'CE · 结合运动',
      full: '有氧训练 + 抗阻力量训练（同一训练中组合进行）',
      bmiMD: -1.25, bmiLow: -1.93, bmiHigh: -0.61,
      sucra: 66.4,
      dose: 130,
      n: 297, arms: 11,
      cssVar: '--s-ce'
    },
    {
      id: 'MICT',
      short: 'MICT · 中强度持续',
      full: '中等强度持续有氧训练（如匀速跑步、骑行等）',
      bmiMD: -1.09, bmiLow: -1.73, bmiHigh: -0.45,
      sucra: 65.5,
      dose: 250,
      n: 320, arms: 12,
      cssVar: '--s-mict'
    },
    {
      id: 'MAE',
      short: 'MAE · 混合有氧',
      full: '多种有氧运动组合（如慢跑+球类+跳绳等）',
      bmiMD: -1.05, bmiLow: -1.67, bmiHigh: -0.42,
      sucra: 52.3,
      dose: 220,
      n: 227, arms: 12,
      cssVar: '--s-mae'
    }
  ];

  // ============ STATE ============
  let myChart = null;
  let currentView = 'bmi';

  // ============ THEME ============
  const html = document.documentElement;
  const themeBtn = document.getElementById('themeBtn');
  const sysDarkMQ = window.matchMedia('(prefers-color-scheme: dark)');

  function getTheme() { return html.getAttribute('data-theme') || 'light'; }
  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    themeBtn.setAttribute('aria-label', t === 'dark' ? '切换浅色模式' : '切换深色模式');
  }
  applyTheme(sysDarkMQ.matches ? 'dark' : 'light');
  sysDarkMQ.addEventListener('change', e => applyTheme(e.matches ? 'dark' : 'light'));
  themeBtn.addEventListener('click', () => applyTheme(getTheme() === 'dark' ? 'light' : 'dark'));

  function getColor(varName) {
    return getComputedStyle(html).getPropertyValue(varName).trim();
  }

  // ============ VIEW SWITCHING ============
  const viewToggles = document.getElementById('viewToggles');
  const chartTitle = document.getElementById('chartTitle');
  const chartSubtitle = document.getElementById('chartSubtitle');
  const chartDom = document.getElementById('mainChart');

  function setView(view) {
    currentView = view;
    document.querySelectorAll('.view-toggle').forEach(b =>
      b.classList.toggle('active', b.dataset.view === view));
    updateLabels();
    renderAll();
  }

  viewToggles.addEventListener('click', e => {
    const btn = e.target.closest('.view-toggle');
    if (!btn) return;
    setView(btn.dataset.view);
  });

  function updateLabels() {
    if (currentView === 'bmi') {
      chartTitle.textContent = 'BMI 降低效果对比（平均差值 MD）';
      chartSubtitle.innerHTML = '数值为运动干预前后的 <strong>BMI 平均差值 (Mean Difference)</strong>，柱状条越长表示减重效果越明显。<br>数据来自 39 项随机对照试验（RCT），共 1814 名 5–19 岁超重/肥胖儿童青少年。';
    } else if (currentView === 'sucra') {
      chartTitle.textContent = '综合效果排名（SUCRA 概率评分）';
      chartSubtitle.innerHTML = '<strong>SUCRA（Surface Under the Cumulative Ranking，累积排名曲线下面积）</strong>范围 0–100%，数值越接近 100% 表示该运动类型成为最优干预方案的可能性越大。<br>基于贝叶斯网络 Meta 分析模型，综合所有研究的直接与间接比较证据计算得出。';
    } else {
      chartTitle.textContent = '达到临床最低效益所需运动剂量对比';
      chartSubtitle.innerHTML = '<strong>METs-min/天 = 代谢当量 (METs) × 运动时长 (分钟)</strong>，表示达到临床最低重要差异（MCID）所需的最低每日运动剂量。<br>剂量越低表示时间效率越高，HIIT 仅需 76 METs-min/天，远低于总体平均最低有效剂量 200 METs-min/天。';
    }
  }

  // ============ STAT TILES ============
  function renderStatTiles() {
    const row = document.getElementById('statRow');
    const sorted = [...exercises].sort((a, b) => {
      if (currentView === 'bmi') return a.bmiMD - b.bmiMD;
      if (currentView === 'sucra') return b.sucra - a.sucra;
      return a.dose - b.dose;
    });
    row.innerHTML = sorted.map(d => {
      const c = getColor(d.cssVar);
      let val, meta;
      if (currentView === 'bmi') {
        val = d.bmiMD.toFixed(2) + ' kg/m²';
        meta = '95% 可信区间 (CrI) [' + d.bmiLow.toFixed(2) + ', ' + d.bmiHigh.toFixed(2) + ']';
      } else if (currentView === 'sucra') {
        val = d.sucra.toFixed(1) + '%';
        meta = '纳入 ' + d.n + ' 名受试者 · ' + d.arms + ' 个研究组';
      } else {
        val = d.dose + ' METs-min/天';
        meta = '最低有效剂量 · 纳入 ' + d.n + ' 名受试者';
      }
      return '<div class="stat-tile">' +
        '<span class="label">' + d.short + '</span>' +
        '<span class="value" style="color:' + c + '">' + val + '</span>' +
        '<span class="meta"><span class="dot" style="background:' + c + '"></span>' + meta + '</span>' +
        '</div>';
    }).join('');
  }

  // ============ MAIN CHART ============
  function renderChart() {
    const t = getTheme();
    const isDark = t === 'dark';
    const txPri = isDark ? '#ffffff' : '#0b0b0b';
    const txSec = isDark ? '#c3c2b7' : '#52514e';
    const txMut = isDark ? '#898781' : '#898781';
    const grid   = isDark ? '#2c2c2a' : '#c5cad3';
    const surf   = isDark ? '#1e1e1e' : '#d2d7df';

    const sorted = [...exercises].sort((a, b) => {
      if (currentView === 'bmi') return a.bmiMD - b.bmiMD;
      if (currentView === 'sucra') return b.sucra - a.sucra;
      return a.dose - b.dose;
    });

    const labels = sorted.map(d => d.short);
    const colors = sorted.map(d => getColor(d.cssVar));

    let seriesData, xName;

    if (currentView === 'bmi') {
      seriesData = sorted.map((d, i) => ({
        value: Math.abs(d.bmiMD),
        itemStyle: { color: colors[i], borderRadius: [0, 4, 4, 0] }
      }));
      xName = 'BMI 降低值 (kg/m²)';
    } else if (currentView === 'sucra') {
      seriesData = sorted.map((d, i) => ({
        value: d.sucra,
        itemStyle: { color: colors[i], borderRadius: [0, 4, 4, 0] }
      }));
      xName = 'SUCRA 评分 (%)';
    } else {
      seriesData = sorted.map((d, i) => ({
        value: d.dose,
        itemStyle: { color: colors[i], borderRadius: [0, 4, 4, 0] }
      }));
      xName = 'METs-min/天';
    }

    const option = {
      backgroundColor: surf,
      textStyle: { fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif" },

      animation: true,
      animationDuration: 700,
      animationEasing: 'cubicOut',
      animationDelay: function(idx) { return idx * 100; },

      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'shadow' },
        backgroundColor: isDark ? '#2a2a28' : '#f5f5f5',
        borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)',
        borderWidth: 1,
        padding: [6, 10],
        extraCssText: 'border-radius:5px;',
        textStyle: { color: txPri, fontSize: 11 },
        formatter: function(ps) {
          const d = sorted[ps[0].dataIndex];
          var h = '<strong style="font-size:12px">' + d.id + ' · ' + d.full + '</strong><br/>';
          if (currentView === 'bmi') {
            h += '<span style="color:' + txSec + '">BMI 平均降低：</span><strong style="font-size:13px">' + d.bmiMD.toFixed(2) + ' kg/m²</strong><br/>';
            h += '<span style="color:' + txSec + '">95% 可信区间 (CrI)：</span>[' + d.bmiLow.toFixed(2) + ', ' + d.bmiHigh.toFixed(2) + ']';
          } else if (currentView === 'sucra') {
            h += '<span style="color:' + txSec + '">SUCRA 综合评分：</span><strong style="font-size:13px">' + d.sucra.toFixed(1) + '%</strong><br/>';
            h += '<span style="color:' + txSec + '">BMI 降低效果：</span>' + d.bmiMD.toFixed(2) + ' kg/m²';
          } else {
            h += '<span style="color:' + txSec + '">最低有效剂量：</span><strong style="font-size:13px">' + d.dose + ' METs-min/天</strong><br/>';
            h += '<span style="color:' + txSec + '">BMI 降低效果：</span>' + d.bmiMD.toFixed(2) + ' kg/m²';
          }
          return h;
        }
      },

      grid: {
        left: '2%', right: '5%', top: '2%', bottom: '10%',
        containLabel: true
      },

      xAxis: {
        type: 'value',
        axisLine: { show: true, lineStyle: { color: grid, width: 1 } },
        axisTick: { show: false },
        axisLabel: {
          color: txMut, fontSize: 10,
          fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif",
          formatter: function(v) {
            if (currentView === 'bmi') return v.toFixed(1);
            if (currentView === 'sucra') return v + '%';
            return v;
          }
        },
        splitLine: { show: true, lineStyle: { color: grid, width: 1 } },
        name: xName,
        nameTextStyle: { color: txSec, fontSize: 10, fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif" },
        nameLocation: 'middle', nameGap: 24
      },

      yAxis: {
        type: 'category',
        data: labels,
        axisLine: { show: true, lineStyle: { color: grid, width: 1 } },
        axisTick: { show: false },
        axisLabel: {
          color: txPri, fontSize: 10, fontWeight: 600,
          fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif",
          margin: 8
        },
        inverse: true
      },

      series: [{
        type: 'bar',
        data: seriesData,
        barWidth: 14,
        emphasis: {
          itemStyle: {
            shadowBlur: 10,
            shadowColor: 'rgba(0,0,0,0.25)',
            shadowOffsetX: 0, shadowOffsetY: 0
          },
          label: { fontWeight: 700 }
        },
        label: {
          show: true,
          position: 'right', distance: 3,
          color: txPri, fontSize: 11, fontWeight: 650,
          fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif",
          formatter: function(p) {
            var d = sorted[p.dataIndex];
            if (currentView === 'bmi') return '↓' + Math.abs(d.bmiMD).toFixed(2);
            if (currentView === 'sucra') return d.sucra.toFixed(1) + '%';
            return d.dose + '';
          }
        }
      }]
    };

    if (!myChart) {
      myChart = echarts.init(chartDom);
      window.addEventListener('resize', function() { myChart.resize(); });
    }

    myChart.setOption(option, true);
  }

  // ============ RENDER ALL ============
  function renderAll() {
    renderChart();
    renderStatTiles();
  }

  // ============ INIT ============
  updateLabels();
  renderAll();

})();
</script>
</body>
</html>
